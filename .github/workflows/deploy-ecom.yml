name: Build & Deploy Ecom

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: rayyen0902/ecom

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Go Server ──
      - name: Build & Push Go Server
        uses: docker/build-push-action@v7
        with:
          context: ./go-server
          file: ./go-server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-go-server:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-go-server:${{ github.sha }}

      # ── Python Worker ──
      - name: Build & Push Python Worker
        uses: docker/build-push-action@v7
        with:
          context: ./python-worker
          file: ./python-worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-python-worker:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-python-worker:${{ github.sha }}

      # ── Agent Orchestrator ──
      - name: Build & Push Agent Orchestrator
        uses: docker/build-push-action@v7
        with:
          context: ./agent-orchestrator
          file: ./agent-orchestrator/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-agent-orchestrator:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-agent-orchestrator:${{ github.sha }}

      # ── Web Frontend ──
      - name: Build & Push Web Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./web-frontend
          file: ./web-frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web-frontend:${{ github.sha }}

      # ── Mirror Docker Hub images to GHCR (server has no Docker Hub access) ──
      - name: Mirror Postgres & Redis to GHCR
        run: |
          docker pull postgres:16-alpine
          docker tag postgres:16-alpine ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres:16-alpine
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres:16-alpine

          docker pull redis:7-alpine
          docker tag redis:7-alpine ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-redis:7-alpine
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-redis:7-alpine

      # ── Deploy ──
      - name: Setup SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to Server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          ENV_ECOM_FILE: ${{ secrets.ENV_ECOM_FILE }}
        run: |
          # scp nginx 配置到服务器
          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new nginx/ecom.conf ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/ecom/ecom.conf
          # 先传配置文件到服务器，再用 SSH 执行部署
          echo "$ENV_ECOM_FILE" > /tmp/env.ecom.b64
          base64 -d /tmp/env.ecom.b64 > /tmp/.env.ecom.tmp
          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new /tmp/.env.ecom.tmp ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/ecom/.env.ecom
          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new docker-compose.ecom.yml ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/ecom/docker-compose.ecom.yml
          rm -f /tmp/env.ecom.b64 /tmp/.env.ecom.tmp
          # ServerAliveInterval=60 每60秒发心跳防 SSH 超时断开
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=60 \
            ${DEPLOY_USER}@${DEPLOY_HOST} \
            "cd /opt/ecom && \
             cp -f ecom.conf /etc/nginx/conf.d/ecom.conf && \
             nginx -t && nginx -s reload && \
             echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${GITHUB_ACTOR} --password-stdin && \
             docker compose --env-file .env.ecom -f docker-compose.ecom.yml pull && \
             docker compose --env-file .env.ecom -f docker-compose.ecom.yml up -d --no-build && \
             sleep 5 && \
             docker compose --env-file .env.ecom -f docker-compose.ecom.yml ps && \
             echo '=== Health Check ===' && \
             HEALTH_STATUS=\$(curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:6300/ || echo '000') && \
             if [ \"\$HEALTH_STATUS\" != '200' ]; then \
               echo \"WARNING: Frontend health check failed (HTTP \$HEALTH_STATUS)\"; \
             else \
               echo 'Frontend health check passed'; \
             fi && \
             echo '=== Deployment Complete ==='"
