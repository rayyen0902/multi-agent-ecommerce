# ========== 多Agent电商系统 — Nginx 路由配置 ==========
# 放置位置: /etc/nginx/conf.d/ecom.conf
# 由宿主机 Nginx 加载，负责 /ecom/ 前缀剥离和反向代理

# 前端 SPA（静态资源 + HTML）
location /ecom/ {
    rewrite ^/ecom/?(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:6300;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Go Server REST API（去掉 /ecom 前缀后转发）
location /ecom/api/ {
    rewrite ^/ecom(/api/.*)$ $1 break;
    proxy_pass http://127.0.0.1:6080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Agent Orchestrator WebSocket
location /ecom/api/agent/ws {
    rewrite ^/ecom(/api/agent/ws.*)$ $1 break;
    proxy_pass http://127.0.0.1:6900;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
}
