# 多Agent电商系统 — Nginx 路由配置
# 放置位置: /etc/nginx/default.d/ecom.conf（不是 conf.d/！）
# 由 knownot.conf 的 server 443 块中 include /etc/nginx/default.d/*.conf 加载

# /ecom/login 精确匹配优先（避免被 /ecom/ 截胡后容器内找不到 /login 路由）
location /ecom/login {
    rewrite ^/ecom/?(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:6300;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /ecom/ {
    rewrite ^/ecom/?(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:6300;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /ecom/api/ {
    rewrite ^/ecom(/api/.*)$ $1 break;
    proxy_pass http://127.0.0.1:6080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /ecom/api/agent/ws {
    rewrite ^/ecom(/api/agent/ws.*)$ $1 break;
    proxy_pass http://127.0.0.1:6900;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
}
