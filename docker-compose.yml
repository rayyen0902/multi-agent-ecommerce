version: "3.9"

services:
  # ========== ĺźşçˇ€č®ľć–˝ ==========
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-ecom_order_hub}
      POSTGRES_USER: ${DB_USER:-ecom}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecom_secret_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./go-server/migration:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecom}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_123} --maxmemory 256mb
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_123}", "ping"]
      interval: 10s
      retries: 5

  # ========== ĺş”ç”¨ćśŤĺŠˇ ==========
  go-server:
    build:
      context: ./go-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-ecom_order_hub}
      - DB_USER=${DB_USER:-ecom}
      - DB_PASSWORD=${DB_PASSWORD:-ecom_secret_123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secret_123}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_at_least_32_chars_long}
      - PYTHON_WORKER_URL=http://python-worker:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  python-worker:
    build:
      context: ./python-worker
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-ecom_order_hub}
      - DB_USER=${DB_USER:-ecom}
      - DB_PASSWORD=${DB_PASSWORD:-ecom_secret_123}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret_123}@redis:6379/0
      - GO_SERVER_URL=http://go-server:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./python-worker
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -l info -c 4 -Q order_sync,logistics,rule_engine
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-ecom_order_hub}
      - DB_USER=${DB_USER:-ecom}
      - DB_PASSWORD=${DB_PASSWORD:-ecom_secret_123}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret_123}@redis:6379/0
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  celery-beat:
    build:
      context: ./python-worker
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app beat -l info
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret_123}@redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  web-frontend:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - go-server
      - agent-orchestrator
    restart: unless-stopped

  agent-orchestrator:
    build:
      context: ./agent-orchestrator
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-ecom_order_hub}
      - DB_USER=${DB_USER:-ecom}
      - DB_PASSWORD=${DB_PASSWORD:-ecom_secret_123}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret_123}@redis:6379/1
      - GO_SERVER_URL=http://go-server:8080
      - PYTHON_WORKER_URL=http://python-worker:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_at_least_32_chars_long}
    depends_on:
      - go-server
      - python-worker
      - redis
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
