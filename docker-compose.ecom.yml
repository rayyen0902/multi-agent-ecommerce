version: "3.9"

services:
  # ========== 基础设施 ==========
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./go-server/migration:/docker-entrypoint-initdb.d
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecom-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 256mb
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecom-net

  # ========== 应用服务 ==========
  go-server:
    image: ghcr.io/rayyen0902/ecom-go-server:latest
    expose:
      - "8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - PYTHON_WORKER_URL=http://python-worker:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecom-net

  python-worker:
    image: ghcr.io/rayyen0902/ecom-python-worker:latest
    expose:
      - "8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - GO_SERVER_URL=http://go-server:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecom-net

  celery-worker:
    image: ghcr.io/rayyen0902/ecom-python-worker:latest
    command: celery -A app.tasks.celery_app worker -l info -c 4 -Q order_sync,logistics,rule_engine
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - ecom-net

  celery-beat:
    image: ghcr.io/rayyen0902/ecom-python-worker:latest
    command: celery -A app.tasks.celery_app beat -l info
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ecom-net

  agent-orchestrator:
    image: ghcr.io/rayyen0902/ecom-agent-orchestrator:latest
    expose:
      - "9000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - GO_SERVER_URL=http://go-server:8080
      - PYTHON_WORKER_URL=http://python-worker:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - go-server
      - python-worker
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - ecom-net

  web-frontend:
    image: ghcr.io/rayyen0902/ecom-web-frontend:latest
    ports:
      - "127.0.0.1:6300:80"
    depends_on:
      - go-server
      - agent-orchestrator
    restart: unless-stopped
    networks:
      - ecom-net

volumes:
  postgres_data:
  redis_data:

networks:
  ecom-net:
    driver: bridge
